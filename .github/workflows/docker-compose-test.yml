name: docker-compose-test

on:
  workflow_call:
  push:
    branches:
      - '*'
      - '!deploy'
      - '!gh-pages'

permissions:
  contents: read

jobs:
  docker-compose-tests:
    # this has a chance of infinite loop if we write a test wrong, timeout should catch it eventually.
    timeout-minutes: 10
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize .docker.env and .env
        run: |
          # .docker.env for Docker Compose (container values)
          cp config.example.json config.docker.json
          # Replace database values
          jq '.database.host = "db"' config.docker.json > tmp.json && mv tmp.json config.docker.json
          cat <<EOF > .docker.env
          PORT=3000
          OAUTH2_CLIENT_ID=1234567890
          OAUTH2_CLIENT_SECRET=1234567890
          CONFIG_PATH=./config.json
          SB_SCHEMA=docker_test
          EOF

          cp config.example.json config.json
          # .env for local app (host values)
          cat <<EOF > .env
          PORT=3000
          OAUTH2_CLIENT_ID=1234567890
          OAUTH2_CLIENT_SECRET=1234567890
          CONFIG_PATH=./config.json
          SB_SCHEMA=docker_test
          EOF

      - name: Install Dependencies
        run: |
          pnpm add -D typescript
          pnpm install --frozen-lockfile

      - name: Set up Supabase Config
        run: |
          echo "Setting up Supabase config..."
          COMMIT_HASH=$(git rev-parse --short HEAD)
          SCHEMA_NAME="docker_test_${COMMIT_HASH}"
          echo "Setting schema to ${SCHEMA_NAME}..."
          pnpm run sb:set-schema ${SCHEMA_NAME}
          sed -i "s/^project_id = .*/project_id = \"${SCHEMA_NAME}\"/" supabase/config.toml
          pnpm script supabase/sb-random-ports
          pnpm sb:start --debug
          echo "Waiting for supabase to be ready..."
          until pnpm run sb:status | grep -q "Development Tools"; do
            echo "Supabase not ready yet, waiting..."
            sleep 5
          done
          echo "Configuring local supabase"
          pnpm run sb:local-config
          pnpm run sb:push

      # - name: Init supabase types
      #   run: pnpm run sb:pull-types

      - name: Build app
        run: pnpm build

      - name: Build Docker image
        run: docker build -t my-app:${{ github.sha }} .

      - name: Debug Docker images
        run: |
          echo "Listing all docker images:"
          docker images
          echo "Compose images for project 'test':"
          docker compose --project-name test images
          echo "Compose ps for project 'test':"
          docker compose --project-name test ps

      - name: Start App
        run: docker compose --project-name test up -d app

      - name: Debug container state
        run: |
          echo "Container status:"
          docker compose --project-name test ps
          echo "App logs:"
          docker compose --project-name test logs app --tail=50
          echo "Port bindings:"
          docker port $(docker compose --project-name test ps -q app) || true

      - name: Wait for app startup
        run: |
          echo "Waiting for app to fully start..."
          for i in $(seq 1 60); do
            if docker compose --project-name test logs app | grep -q "listening on"; then
              echo "App is ready! (found 'listening on' in logs)"
              exit 0
            fi
            if curl -f http://localhost:3000 >/dev/null 2>&1; then
              echo "App responding to requests!"
              exit 0
            fi
            echo "Waiting for app startup... (attempt $i/60)"
            sleep 2
          done
          echo "App failed to start within timeout!"
          echo "Final app logs:"
          docker compose --project-name test logs app --tail=20
          exit 1

      - name: Scan Docker image with Trivy
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:latest image my-app:${{ github.sha }}

      - name: Shutdown supabase
        if: always()
        run: |
          pnpm sb:stop --no-backup
          docker rm -f $(docker ps -aq --filter "name=supabase-${SCHEMA_NAME}") || true

      - name: Clean up Supabase config
        if: always()
        run: rm -f config.json .env

      - name: Tear down Docker Compose
        if: always()
        run: docker compose --project-name test down -v --remove-orphans
