name: Svelte Check

on:
  workflow_call:
    # secrets:
    #   GH_TOKEN:
    #     description: 'GitHub Token'
    #     required: true
  push:
    branches:
      - '*'
      - '!deploy'
      - '!gh-pages'

permissions:
  contents: read

jobs:
  tsc:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Retrieve git dependencies
        uses: actions/checkout@v3
        with:
          submodules: 'true'
          #  token: ${{ secrets.GH_TOKEN }}

      - name: Install dependencies
        run: |
          echo "Installing dependencies..."
          pnpm add -D typescript
          pnpm install --frozen-lockfile

      - name: Load .env variables
        run: |
          cp config.example.json config.json
          touch .env
          echo "OAUTH2_CLIENT_ID=1234567890" >> .env
          echo "OAUTH2_CLIENT_SECRET=1234567890" >> .env
          echo "CONFIG_PATH=./config.json" >> .env
          export $(cat .env | xargs)
      - name: Set up Supabase Config
        run: |
          echo "Setting up Supabase config..."
          COMMIT_HASH=$(git rev-parse --short HEAD)
          SCHEMA_NAME="unit_test_${COMMIT_HASH}"
          sed -i "s/^project_id = .*/project_id = \"${COMMIT_HASH}\"/" supabase/config.toml
          pnpm sb:start
          pnpm run sb:local-config
          pnpm run sb:set-schema ${SCHEMA_NAME}
          pnpm run sb:push

      - name: Init supabase types
        run: pnpm run sb:init

      - name: Run
        run: |
          echo "Testing..."
          pnpm run check

      - name: Drop Supabase schema
        if: always()
        run: pnpm run sb:drop-schema

      - name: Shutdown supabase
        if: always()
        run: pnpm sb:stop

      - name: Clean up Supabase config
        if: always()
        run: rm -f config.json .env
