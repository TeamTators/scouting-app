services:
  app:
    image: my-app:latest
    pull_policy: never
    container_name: myapp_container
    env_file:
      - .docker.env
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - redis
    ports:
      - '${PORT}:${PORT}'
    volumes:
      - appdata:/app

  redis:
    container_name: redis
    image: redis:7
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
  appdata:
